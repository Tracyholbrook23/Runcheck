apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'expo-module'

android {
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 24)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
    // Opt-in to Media3 @UnstableApi without needing per-file annotations
    freeCompilerArgs += ["-opt-in=androidx.media3.common.util.UnstableApi"]
  }
}

repositories {
  google()
  mavenCentral()
}

dependencies {
  // Jetpack Media3 — on-device video processing
  // Transformer handles clipping/trimming via MediaItem.ClippingConfiguration
  implementation "androidx.media3:media3-transformer:1.4.1"
  implementation "androidx.media3:media3-common:1.4.1"
}
